# List of VMs to create
#
# Overview
#   A simple list of VMs and their specs and isos that we want mounted.
#   VMs marked with preseed_install: true are handled by the automated
#   Debian installer pipeline:
#     1. build-debian-preseed-iso.yml  - Build preseed ISO
#     2. auto-install-debian.yml       - Boot + wait for install
#     3. setup-debian-base.yml         - Install base packages
#
# What this playbook does
#   * LIST of VM(s) to create
#       - Creates VM "shells" (vmid, CPU/RAM, net0, agent, scsihw, etc.)
#
# Key features
#   * One place/file to change VM specs
#
# Preseed-specific fields (used by auto-install-debian.yml)
#   preseed_install: true/false    Flag VM for automated Debian install
#   ip_address: "x.x.x.x"         Expected IP after install (DHCP reservation
#                                  or static via preseed preseed_ip variable)
#   preseed_ip: "x.x.x.x"         (optional) static IP passed into the preseed
#   preseed_hostname: "hostname"   (optional) per-VM hostname override
#
# Absolute minimum of parameters to create a VM
#
#     vms:
#       - name: "ansible-minimal-vm"
#         vmid: 600
#         ostype: "l26"
#         iso_storage: "local"
#         iso_path: "iso/"
#         iso_file: "debian-13-amd64-preseed.iso"
#
# Credit: Thomas Mozdren

vms:
